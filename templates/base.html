<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}RestaurantIQ{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">

    <div class="container">

        <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">
            🍽 RestaurantIQ
        </a>

        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarMenu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarMenu">

            <ul class="navbar-nav ms-auto align-items-lg-center">

                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint=='home' %}active{% endif %}"
                        href="{{ url_for('home') }}">

                        <i class="bi bi-magic"></i>

                        Forecast

                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint=='recommend' %}active{% endif %}"
                        href="{{ url_for('recommend') }}">

                        <i class="bi bi-box-seam"></i>

                        Inventory

                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint=='dashboard' %}active{% endif %}"
                        href="{{ url_for('dashboard') }}">

                        <i class="bi bi-speedometer2"></i>

                        Dashboard

                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint=='analytics' %}active{% endif %}"
                        href="{{ url_for('analytics') }}">

                        <i class="bi bi-bar-chart-line"></i>

                        Analytics

                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint=='metrics' %}active{% endif %}"
                        href="{{ url_for('metrics') }}">

                        <i class="bi bi-cpu"></i>

                        Models

                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint=='history' %}active{% endif %}"
                        href="{{ url_for('history') }}">

                        <i class="bi bi-clock-history"></i>

                        History

                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<main class="container">

{% block content %}

{% endblock %}

</main>

<footer>

    <div class="container text-center">

        <hr style="border-color:rgba(255,255,255,.08);">

        <p class="mb-1">

            <strong style="color:var(--primary);">
                RestaurantIQ
            </strong>

            · AI-powered Restaurant Operations Intelligence

        </p>

        <small class="text-muted">

            Flask • Scikit-learn • XGBoost • LightGBM • SQLite

        </small>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
